version: "3.9"

services:
  db:
    image: postgres:16
    container_name: clinic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinicdb
      POSTGRES_USER: clinicuser
      POSTGRES_PASSWORD: clinicpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicuser -d clinicdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: clinic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: clinic_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=clinicdb;Username=clinicuser;Password=clinicpass
      Jwt__Key: super-secret-development-key-change-this
      Jwt__Issuer: clinic-platform
      Jwt__Audience: clinic-platform-users
      Jwt__ExpireMinutes: 120
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__UseSsl: ${SMTP_SSL:-true}
      Smtp__UserName: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASS:-}
      Smtp__FromAddress: ${SMTP_FROM:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-EstetixOS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: clinic_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
      NEXT_PUBLIC_BUILD_VERSION: ${BUILD_VERSION:-dev}
      # Server-side: internal Docker network URL (Next.js API routes → backend)
      API_BASE_URL: http://clinic_backend:8080/api
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:stable
    container_name: clinic_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
